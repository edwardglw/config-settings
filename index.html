<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>VISU</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- ── PAGE 1 ─────────────────────────────────────── -->
<div id="page1" class="page">
  <canvas id="demo-canvas"></canvas>
  <div class="p1-center">
    <div class="p1-eyebrow">
      <span class="p1-label">Image as brand analysis</span>
      <span class="v-badge">v4</span>
    </div>
    <label class="upload-btn" for="file-input">
      <svg viewBox="0 0 22 22" fill="none">
        <path d="M11 3v12M5 8l6-6 6 6" stroke="currentColor" stroke-width="1.7"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 18h16" stroke="currentColor" stroke-width="1.7"
              stroke-linecap="round" opacity="0.4"/>
      </svg>
      Upload image
    </label>
    <input id="file-input" type="file" accept="image/*"/>
  </div>
</div>

<!-- ── PAGE 2 ─────────────────────────────────────── -->
<div id="page2" class="page is-hidden">
  <canvas id="vis-canvas"></canvas>

  <!-- Loading overlay -->
  <div id="p2-loader" class="p2-loader">
    <svg class="ld-spinner" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="18" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
      <circle cx="22" cy="22" r="18" stroke="url(#ldg)" stroke-width="2.5"
              stroke-linecap="round" stroke-dasharray="88" stroke-dashoffset="66"
              class="ld-arc"/>
      <defs>
        <linearGradient id="ldg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
          <stop stop-color="rgba(var(--img-primary,124,108,252),1)"/>
          <stop offset="1" stop-color="rgba(var(--img-accent,56,189,248),1)"/>
        </linearGradient>
      </defs>
    </svg>
    <p class="ld-msg" id="ld-msg">Analysing…</p>
    <div class="ld-bar"><div class="ld-fill" id="ld-fill"></div></div>
    <p class="ld-pct" id="ld-pct">0%</p>
  </div>

  <!-- Fade overlay for treatment transitions -->
  <div id="vis-fade" class="vis-fade"></div>

  <!-- Top control bar -->
  <header class="ctrl-bar" id="ctrl-bar">
    <div class="ctrl-left">
      <span class="logo">VISU<span class="v-badge">v4</span></span>
      <span class="ctrl-sep-v"></span>
      <span class="vis-title" id="vis-title">—</span>
    </div>

    <nav class="ctrl-actions" id="ctrl-actions">
      <button class="cb" id="btn-history"  data-tip="History">
        <svg viewBox="0 0 18 18" fill="none">
          <rect x="2" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="10" y="2" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="2" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="10" y="10" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
      <button class="cb" id="btn-style" data-tip="Change style">
        <svg viewBox="0 0 18 18" fill="none">
          <path d="M9 2l1.5 4.5L15 8l-4.5 1.5L9 14l-1.5-4.5L3 8l4.5-1.5L9 2Z"
                stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="ctrl-divider"></span>
      <button class="cb" id="btn-cards" data-tip="Toggle cards">
        <svg viewBox="0 0 18 18" fill="none">
          <rect x="2" y="5" width="14" height="4" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="2" y="11" width="14" height="4" rx="1.5" stroke="currentColor" stroke-width="1.5" opacity="0.45"/>
        </svg>
      </button>
      <button class="cb" id="btn-download" data-tip="Download">
        <svg viewBox="0 0 18 18" fill="none">
          <path d="M9 3v9M5 9l4 4 4-4" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 15h12" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" opacity="0.4"/>
        </svg>
      </button>
      <button class="cb" id="btn-replace" data-tip="Replace image">
        <svg viewBox="0 0 18 18" fill="none">
          <path d="M9 14V5M5 9l4-4 4 4" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 15h12" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" opacity="0.4"/>
        </svg>
      </button>
    </nav>

    <!-- Mobile hamburger -->
    <button class="ctrl-more" id="ctrl-more" aria-label="Actions" aria-expanded="false">
      <svg class="icon-menu" viewBox="0 0 18 18" fill="none">
        <path d="M3 5h12M3 9h12M3 13h12" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round"/>
      </svg>
      <svg class="icon-close" viewBox="0 0 18 18" fill="none">
        <path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <!-- Slide-down panels -->
  <div class="panel" id="panel-history" aria-hidden="true">
    <div class="panel-inner">
      <p class="panel-label">History</p>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>

  <div class="panel" id="panel-style" aria-hidden="true">
    <div class="panel-inner">
      <p class="panel-label">Visual Style</p>
      <div class="style-grid" id="style-grid"></div>
    </div>
  </div>

  <!-- Horizontal cards strip -->
  <div class="cards-strip" id="cards-strip">
    <div class="cards-scroll" id="cards-scroll"></div>
  </div>
</div>

<!-- Hidden replace input -->
<input id="file-replace" type="file" accept="image/*" style="position:fixed;left:-9999px;top:-9999px"/>

<script src="analysis.js"></script>
<script src="treatments.js"></script>
<script src="cards.js"></script>
<script src="app.js"></script>
</body>
</html>
